name: Produção Diária de Apostilas EBE (Groq)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      quantidade:
        description: "Quantidade"
        required: false
        default: "11"

permissions:
  contents: write

jobs:
  gerar-apostilas:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: ${{ vars.GROQ_MODEL || 'llama-3.1-70b-versatile' }}
      APOSTILAS_POR_EXECUCAO: ${{ vars.APOSTILAS_POR_EXECUCAO || '11' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar
        run: |
          pip install -r requirements.txt
          pip install -e . groq

      - name: Gerar lote com Groq
        run: |
          python -m ebe_apostilas.cli.main gerar-lote --quantidade ${{ github.event.inputs.quantidade || 11 }} --workflow "github-actions-diario"

      - name: Commit metadados
        if: always()
        run: |
          git config user.name "ebe-bot"
          git config user.email "bot@github.com"
          git add data/ PROJECT_STATE.md CHANGELOG.md logs/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore(producao): Groq batch" && git push