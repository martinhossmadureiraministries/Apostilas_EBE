name: Produção Diária de Apostilas EBE (Groq)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      quantidade:
        description: "Número de apostilas a gerar (recomendado 1-3 para teste)"
        required: false
        default: "1"

permissions:
  contents: write

concurrency:
  group: producao-apostilas-ebe
  cancel-in-progress: false

jobs:
  gerar-apostilas:
    name: Gerar lote com Groq
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      GEMINI_API_KEY: ${{ secrets.GROQ_API_KEY }}     # Hack para validação
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: ${{ vars.GROQ_MODEL || 'llama-3.1-70b-versatile' }}
      APOSTILAS_POR_EXECUCAO: ${{ vars.APOSTILAS_POR_EXECUCAO || '1' }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . groq

      - name: Validar ambiente
        run: |
          python -m ebe_apostilas.cli.main validar-curriculo
          python -m ebe_apostilas.cli.main validar-ambiente

      - name: Mostrar estado atual
        run: python -m ebe_apostilas.cli.main status

      - name: Gerar lote
        run: |
          QTD="${{ github.event.inputs.quantidade }}"
          if [ -n "$QTD" ]; then
            python -m ebe_apostilas.cli.main gerar-lote --quantidade "$QTD" --workflow "github-actions-diario"
          else
            python -m ebe_apostilas.cli.main gerar-lote --workflow "github-actions-diario"
          fi

      - name: Mostrar estado final
        if: always()
        run: python -m ebe_apostilas.cli.main status

      - name: Commit metadados
        if: always()
        run: |
          git config user.name "ebe-apostilas-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ PROJECT_STATE.md CHANGELOG.md logs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nenhuma alteração para commitar."
          else
            git commit -m "chore(producao): geração Groq [skip ci]"
            git pull --rebase origin main || true
            git push origin HEAD:main || true
          fi

      - name: Artefactos (logs + apostilas)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ github.run_id }}
          path: |
            logs/*.log
            output/apostilas/*.docx
          retention-days: 7