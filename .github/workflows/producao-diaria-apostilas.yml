name: Produção Diária de Apostilas EBE

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      quantidade:
        description: "Número de apostilas a gerar (deixe vazio = 11)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: producao-apostilas-ebe
  cancel-in-progress: false

jobs:
  gerar-apostilas:
    name: Gerar lote + upload Drive
    runs-on: ubuntu-latest
    timeout-minutes: 340

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
      GEMINI_FALLBACK_MODEL: ${{ vars.GEMINI_FALLBACK_MODEL || 'gemini-2.0-flash' }}
      GEMINI_RPM_LIMIT: ${{ vars.GEMINI_RPM_LIMIT || '8' }}
      GEMINI_TPM_LIMIT: ${{ vars.GEMINI_TPM_LIMIT || '200000' }}
      GEMINI_RPD_LIMIT: ${{ vars.GEMINI_RPD_LIMIT || '180' }}
      APOSTILAS_POR_EXECUCAO: ${{ vars.APOSTILAS_POR_EXECUCAO || '1' }}  # ← Reduzido para evitar quota
      GOOGLE_DRIVE_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_FOLDER_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências + Google Drive
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . google-auth google-api-python-client

      - name: Validar
        run: |
          python -m ebe_apostilas.cli.main validar-curriculo
          python -m ebe_apostilas.cli.main validar-ambiente

      - name: Gerar lote
        run: |
          QTD="${{ github.event.inputs.quantidade }}"
          if [ -n "$QTD" ]; then
            python -m ebe_apostilas.cli.main gerar-lote --quantidade "$QTD" --workflow "github-actions-diario"
          else
            python -m ebe_apostilas.cli.main gerar-lote --workflow "github-actions-diario"
          fi

      - name: Upload apostilas para Google Drive
        if: always()
        run: |
          python - <<EOF
import os, glob, json
from google.oauth2.service_account import Credentials
from googleapiclient.discovery import build
from googleapiclient.http import MediaFileUpload

folder_id = os.getenv('GOOGLE_DRIVE_FOLDER_ID')
if not folder_id:
  print("Sem GOOGLE_DRIVE_FOLDER_ID configurado.")
else:
  creds = Credentials.from_service_account_info(json.loads(os.getenv('GOOGLE_DRIVE_CREDENTIALS')))
  drive = build('drive', 'v3', credentials=creds)
  for docx in glob.glob('output/apostilas/*.docx'):
    file_metadata = {'name': os.path.basename(docx), 'parents': [folder_id]}
    media = MediaFileUpload(docx, mimetype='application/vnd.openxmlformats-officedocument.wordprocessingml.document', resumable=True)
    drive.files().create(body=file_metadata, media_body=media, fields='id').execute()
    print(f'✅ Upload: {os.path.basename(docx)}')
EOF

      - name: Commit metadados
        if: always()
        run: |
          git config user.name "ebe-apostilas-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ PROJECT_STATE.md CHANGELOG.md logs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nada para commitar."
          else
            git commit -m "chore(producao): geração + upload Drive [skip ci]"
            git pull --rebase origin main || true
            git push origin HEAD:main || true
          fi

      - name: Artefactos (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ github.run_id }}
          path: |
            logs/*.log
            output/apostilas/*.docx
          retention-days: 7