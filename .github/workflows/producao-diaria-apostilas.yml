name: Produção Diária de Apostilas EBE

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      quantidade:
        description: "Número de apostilas a gerar (deixe vazio = 11)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: producao-apostilas-ebe
  cancel-in-progress: false

jobs:
  gerar-apostilas:
    name: Gerar lote diário de apostilas
    runs-on: ubuntu-latest
    timeout-minutes: 340

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
      GEMINI_FALLBACK_MODEL: ${{ vars.GEMINI_FALLBACK_MODEL || 'gemini-2.0-flash' }}
      GEMINI_RPM_LIMIT: ${{ vars.GEMINI_RPM_LIMIT || '8' }}
      GEMINI_TPM_LIMIT: ${{ vars.GEMINI_TPM_LIMIT || '200000' }}
      GEMINI_RPD_LIMIT: ${{ vars.GEMINI_RPD_LIMIT || '180' }}
      APOSTILAS_POR_EXECUCAO: ${{ vars.APOSTILAS_POR_EXECUCAO || '11' }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Validar currículo e ambiente
        run: |
          python -m ebe_apostilas.cli.main validar-curriculo
          python -m ebe_apostilas.cli.main validar-ambiente

      - name: Mostrar estado atual
        run: python -m ebe_apostilas.cli.main status

      - name: Gerar lote de apostilas
        run: |
          QTD="${{ github.event.inputs.quantidade }}"
          if [ -n "$QTD" ]; then
            python -m ebe_apostilas.cli.main gerar-lote --quantidade "$QTD" --workflow "github-actions-diario"
          else
            python -m ebe_apostilas.cli.main gerar-lote --workflow "github-actions-diario"
          fi

      - name: Mostrar estado final
        if: always()
        run: python -m ebe_apostilas.cli.main status

      - name: Fazer commit dos metadados (data/, PROJECT_STATE.md, logs)
        if: always()
        run: |
          git config user.name "ebe-apostilas-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ PROJECT_STATE.md CHANGELOG.md logs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nenhuma alteração para commitar."
          else
            git commit -m "chore(producao): geração automática diária [skip ci]"
            git pull --rebase origin main || true
            git push origin HEAD:main || true
          fi

      - name: Publicar logs e apostilas geradas como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apostilas-e-logs-${{ github.run_id }}
          path: |
            logs/*.log
            output/apostilas/*.docx
          retention-days: 30
          if-no-files-found: warn